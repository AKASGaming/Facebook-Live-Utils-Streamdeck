<!DOCTYPE html>
<html>

<head lang="en">
    <title>Toggle Pin Link</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        .hint {
            color: var(--sdpi-color);
            font-size: 11px;
            opacity: 0.85;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <sdpi-item label="Bridge URL">
        <sdpi-textfield setting="bridgeUrl" placeholder="http://127.0.0.1:9742" global></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Link">
        <sdpi-select
            setting="linkId"
            datasource="getLinks"
            loading="Loading links from Live Producer..."
            hot-reload
            placeholder="Choose a link">
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Setup">
        <div class="hint">
            Links are read automatically from the Featured Links panel in Facebook Live Producer.
            Keep the bridge running, reload the extension after updates, and leave Live Producer open with the Links tab visible.
        </div>
    </sdpi-item>
</body>

</html>
